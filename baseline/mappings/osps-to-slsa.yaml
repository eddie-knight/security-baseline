title: OSPS Baseline to Supply-chain Levels for Software Artifacts
metadata:
  id: osps-to-slsa
  type: MappingDocument
  gemara-version: v1.0.0-rc.1
  description: Mapping between OSPS Baseline controls and Supply-chain Levels for Software Artifacts.
  author:
    id: osps-authors
    name: OSPS Authors
    type: Human
  mapping-references:
  - id: osps-baseline
    title: Open Source Project Security Baseline
    version: devel
  - id: SLSA
    title: Supply Chain Levels for Software Artifacts
    version: "1.0"
    url: https://github.com/slsa-framework/slsa
    description: "SLSA (pronounced \"salsa\") is a security framework from source to service, giving anyone working with software a common language for increasing levels of software security and supply chain integrity. It’s how you get from safe enough to being as resilient as possible, at any link in the chain."
